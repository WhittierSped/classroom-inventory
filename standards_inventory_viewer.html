<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standards Inventory Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .filters {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 3px solid #e9ecef;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
        }
        
        .filter-group label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #495057;
            font-size: 0.9em;
        }
        
        .filter-group select,
        .filter-group input {
            padding: 10px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }
        
        .stats {
            padding: 20px 30px;
            background: white;
            display: flex;
            justify-content: space-around;
            border-bottom: 2px solid #e9ecef;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .stat-card {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            min-width: 150px;
        }
        
        .stat-card.math {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
        }
        
        .stat-card.literacy {
            background: linear-gradient(135deg, #ee82ee 0%, #da70d6 100%);
        }
        
        .stat-card.sel {
            background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
            color: white;
        }
        
        .stat-card .number {
            font-size: 2.5em;
            font-weight: bold;
            display: block;
        }
        
        .stat-card .label {
            font-size: 0.9em;
            font-weight: 600;
            margin-top: 5px;
        }
        
        .content {
            padding: 30px;
        }
        
        .resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .resource-card {
            border: 2px solid #dee2e6;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            background: white;
        }
        
        .resource-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .resource-card.math {
            border-left: 5px solid #ffd700;
        }
        
        .resource-card.literacy {
            border-left: 5px solid #ee82ee;
        }
        
        .resource-card.sel {
            border-left: 5px solid #ff69b4;
        }
        
        .resource-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }
        
        .resource-id {
            font-weight: bold;
            color: #667eea;
            font-size: 0.9em;
        }
        
        .resource-category {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
        }
        
        .category-math {
            background: #ffd700;
            color: #333;
        }
        
        .category-literacy {
            background: #ee82ee;
            color: white;
        }
        
        .category-sel {
            background: #ff69b4;
            color: white;
        }
        
        .resource-name {
            font-size: 1.2em;
            font-weight: 700;
            margin-bottom: 10px;
            color: #212529;
        }
        
        .resource-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .meta-tag {
            padding: 4px 10px;
            background: #e9ecef;
            border-radius: 6px;
            font-size: 0.85em;
            color: #495057;
        }
        
        .resource-description {
            color: #6c757d;
            font-size: 0.9em;
            margin-bottom: 10px;
            line-height: 1.5;
        }
        
        .resource-link {
            display: inline-block;
            margin-top: 10px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9em;
        }
        
        .resource-link:hover {
            text-decoration: underline;
        }
        
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }
        
        .no-results h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #667eea;
        }
        
        .standards-list {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e9ecef;
        }
        
        .standards-list h4 {
            font-size: 0.9em;
            color: #495057;
            margin-bottom: 8px;
        }
        
        .standard-tag {
            display: inline-block;
            padding: 4px 8px;
            margin: 4px 4px 4px 0;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            font-size: 0.75em;
            color: #495057;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Standards Inventory Viewer</h1>
            <p>General Education Resources & Standards Alignment</p>
        </div>
        
        <div class="filters">
            <div class="filter-group">
                <label for="domainFilter">Domain</label>
                <select id="domainFilter">
                    <option value="all">All Domains</option>
                    <option value="Math">Math</option>
                    <option value="Literacy">Literacy</option>
                    <option value="SEL">SEL</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label for="gradeFilter">Grade Level</label>
                <select id="gradeFilter">
                    <option value="all">All Grades</option>
                    <option value="K">Kindergarten</option>
                    <option value="1">1st Grade</option>
                    <option value="2">2nd Grade</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label for="typeFilter">Resource Type</label>
                <select id="typeFilter">
                    <option value="all">All Types</option>
                    <option value="Worksheet">Worksheet</option>
                    <option value="Game">Game</option>
                    <option value="Assessment">Assessment</option>
                    <option value="Activity">Activity</option>
                    <option value="Book">Book</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label for="searchBox">Search Resources</label>
                <input type="text" id="searchBox" placeholder="Search by name or description...">
            </div>
            
            <div class="filter-group" style="grid-column: 1 / -1;">
                <div class="button-group">
                    <button class="btn-primary" onclick="loadFromGoogleSheets()">📊 Load from Google Sheets</button>
                    <button class="btn-secondary" onclick="resetFilters()">🔄 Reset Filters</button>
                </div>
            </div>
        </div>
        
        <div class="stats" id="stats">
            <div class="stat-card math">
                <span class="number" id="mathCount">0</span>
                <span class="label">Math Resources</span>
            </div>
            <div class="stat-card literacy">
                <span class="number" id="literacyCount">0</span>
                <span class="label">Literacy Resources</span>
            </div>
            <div class="stat-card sel">
                <span class="number" id="selCount">0</span>
                <span class="label">SEL Resources</span>
            </div>
        </div>
        
        <div class="content">
            <div id="resourcesContainer" class="resource-grid"></div>
        </div>
    </div>

    <script>
        // Embedded standards data (72 standards from the template)
        const STANDARDS_DATA = [{"id":"K.CC.A.1","domain":"Math","gradeLevel":"K","category":"Counting & Cardinality","description":"Count to 100 by ones and by tens"},{"id":"K.CC.A.2","domain":"Math","gradeLevel":"K","category":"Counting & Cardinality","description":"Count forward beginning from a given number"},{"id":"K.CC.A.3","domain":"Math","gradeLevel":"K","category":"Counting & Cardinality","description":"Write numbers from 0 to 20"},{"id":"K.CC.B.4","domain":"Math","gradeLevel":"K","category":"Counting & Cardinality","description":"Understand the relationship between numbers and quantities"},{"id":"K.CC.B.5","domain":"Math","gradeLevel":"K","category":"Counting & Cardinality","description":"Count to answer \"how many?\""},{"id":"K.OA.A.1","domain":"Math","gradeLevel":"K","category":"Operations & Algebraic Thinking","description":"Represent addition and subtraction"},{"id":"K.OA.A.2","domain":"Math","gradeLevel":"K","category":"Operations & Algebraic Thinking","description":"Solve addition and subtraction word problems"},{"id":"K.NBT.A.1","domain":"Math","gradeLevel":"K","category":"Number & Operations in Base Ten","description":"Compose and decompose numbers from 11 to 19"},{"id":"K.MD.A.1","domain":"Math","gradeLevel":"K","category":"Measurement & Data","description":"Describe measurable attributes of objects"},{"id":"K.MD.B.3","domain":"Math","gradeLevel":"K","category":"Measurement & Data","description":"Classify objects and count the number of objects in each category"},{"id":"K.G.A.1","domain":"Math","gradeLevel":"K","category":"Geometry","description":"Describe objects in the environment using names of shapes"},{"id":"K.G.B.4","domain":"Math","gradeLevel":"K","category":"Geometry","description":"Analyze and compare two- and three-dimensional shapes"},{"id":"1.OA.A.1","domain":"Math","gradeLevel":"1","category":"Operations & Algebraic Thinking","description":"Use addition and subtraction within 20 to solve word problems"},{"id":"1.OA.B.3","domain":"Math","gradeLevel":"1","category":"Operations & Algebraic Thinking","description":"Apply properties of operations as strategies"},{"id":"1.OA.C.6","domain":"Math","gradeLevel":"1","category":"Operations & Algebraic Thinking","description":"Add and subtract within 20"},{"id":"1.NBT.A.1","domain":"Math","gradeLevel":"1","category":"Number & Operations in Base Ten","description":"Count to 120, starting at any number"},{"id":"1.NBT.B.2","domain":"Math","gradeLevel":"1","category":"Number & Operations in Base Ten","description":"Understand that the two digits of a two-digit number represent tens and ones"},{"id":"1.NBT.C.4","domain":"Math","gradeLevel":"1","category":"Number & Operations in Base Ten","description":"Add within 100"},{"id":"1.MD.A.1","domain":"Math","gradeLevel":"1","category":"Measurement & Data","description":"Order three objects by length"},{"id":"1.MD.C.4","domain":"Math","gradeLevel":"1","category":"Measurement & Data","description":"Organize, represent, and interpret data"},{"id":"1.G.A.1","domain":"Math","gradeLevel":"1","category":"Geometry","description":"Distinguish between defining attributes of shapes"},{"id":"1.G.A.3","domain":"Math","gradeLevel":"1","category":"Geometry","description":"Partition circles and rectangles into two and four equal shares"},{"id":"2.OA.A.1","domain":"Math","gradeLevel":"2","category":"Operations & Algebraic Thinking","description":"Use addition and subtraction within 100 to solve word problems"},{"id":"2.OA.B.2","domain":"Math","gradeLevel":"2","category":"Operations & Algebraic Thinking","description":"Fluently add and subtract within 20"},{"id":"2.NBT.A.1","domain":"Math","gradeLevel":"2","category":"Number & Operations in Base Ten","description":"Understand that the three digits of a three-digit number represent hundreds, tens, and ones"},{"id":"2.NBT.B.5","domain":"Math","gradeLevel":"2","category":"Number & Operations in Base Ten","description":"Fluently add and subtract within 100"},{"id":"2.NBT.B.7","domain":"Math","gradeLevel":"2","category":"Number & Operations in Base Ten","description":"Add and subtract within 1000"},{"id":"2.MD.A.1","domain":"Math","gradeLevel":"2","category":"Measurement & Data","description":"Measure the length of an object"},{"id":"2.MD.C.8","domain":"Math","gradeLevel":"2","category":"Measurement & Data","description":"Solve word problems involving dollar bills, quarters, dimes, nickels, and pennies"},{"id":"2.MD.D.10","domain":"Math","gradeLevel":"2","category":"Measurement & Data","description":"Draw a picture graph and a bar graph"},{"id":"2.G.A.1","domain":"Math","gradeLevel":"2","category":"Geometry","description":"Recognize and draw shapes having specified attributes"},{"id":"K.RF.1","domain":"Literacy","gradeLevel":"K","category":"Reading: Foundational Skills","description":"Demonstrate understanding of the organization and basic features of print"},{"id":"K.RF.2","domain":"Literacy","gradeLevel":"K","category":"Reading: Foundational Skills","description":"Demonstrate understanding of spoken words, syllables, and sounds"},{"id":"K.RF.3","domain":"Literacy","gradeLevel":"K","category":"Reading: Foundational Skills","description":"Know and apply grade-level phonics and word analysis skills"},{"id":"K.RL.1","domain":"Literacy","gradeLevel":"K","category":"Reading: Literature","description":"Ask and answer questions about key details in a text"},{"id":"K.RL.3","domain":"Literacy","gradeLevel":"K","category":"Reading: Literature","description":"Identify characters, settings, and major events in a story"},{"id":"K.RI.1","domain":"Literacy","gradeLevel":"K","category":"Reading: Informational","description":"Ask and answer questions about key details in a text"},{"id":"K.W.1","domain":"Literacy","gradeLevel":"K","category":"Writing","description":"Use a combination of drawing, dictating, and writing to compose opinion pieces"},{"id":"K.W.2","domain":"Literacy","gradeLevel":"K","category":"Writing","description":"Use a combination of drawing, dictating, and writing to compose informative/explanatory texts"},{"id":"K.SL.1","domain":"Literacy","gradeLevel":"K","category":"Speaking & Listening","description":"Participate in collaborative conversations"},{"id":"K.L.1","domain":"Literacy","gradeLevel":"K","category":"Language","description":"Demonstrate command of the conventions of standard English grammar"},{"id":"1.RF.2","domain":"Literacy","gradeLevel":"1","category":"Reading: Foundational Skills","description":"Demonstrate understanding of spoken words, syllables, and sounds"},{"id":"1.RF.3","domain":"Literacy","gradeLevel":"1","category":"Reading: Foundational Skills","description":"Know and apply grade-level phonics and word analysis skills"},{"id":"1.RF.4","domain":"Literacy","gradeLevel":"1","category":"Reading: Foundational Skills","description":"Read with sufficient accuracy and fluency to support comprehension"},{"id":"1.RL.1","domain":"Literacy","gradeLevel":"1","category":"Reading: Literature","description":"Ask and answer questions about key details in a text"},{"id":"1.RL.3","domain":"Literacy","gradeLevel":"1","category":"Reading: Literature","description":"Describe characters, settings, and major events using key details"},{"id":"1.RI.1","domain":"Literacy","gradeLevel":"1","category":"Reading: Informational","description":"Ask and answer questions about key details in a text"},{"id":"1.W.1","domain":"Literacy","gradeLevel":"1","category":"Writing","description":"Write opinion pieces"},{"id":"1.W.2","domain":"Literacy","gradeLevel":"1","category":"Writing","description":"Write informative/explanatory texts"},{"id":"1.SL.1","domain":"Literacy","gradeLevel":"1","category":"Speaking & Listening","description":"Participate in collaborative conversations"},{"id":"1.L.1","domain":"Literacy","gradeLevel":"1","category":"Language","description":"Demonstrate command of the conventions of standard English grammar"},{"id":"2.RF.3","domain":"Literacy","gradeLevel":"2","category":"Reading: Foundational Skills","description":"Know and apply grade-level phonics and word analysis skills"},{"id":"2.RF.4","domain":"Literacy","gradeLevel":"2","category":"Reading: Foundational Skills","description":"Read with sufficient accuracy and fluency to support comprehension"},{"id":"2.RL.1","domain":"Literacy","gradeLevel":"2","category":"Reading: Literature","description":"Ask and answer such questions as who, what, where, when, why, and how"},{"id":"2.RL.3","domain":"Literacy","gradeLevel":"2","category":"Reading: Literature","description":"Describe how characters respond to major events and challenges"},{"id":"2.RI.1","domain":"Literacy","gradeLevel":"2","category":"Reading: Informational","description":"Ask and answer such questions as who, what, where, when, why, and how"},{"id":"2.W.1","domain":"Literacy","gradeLevel":"2","category":"Writing","description":"Write opinion pieces"},{"id":"2.W.2","domain":"Literacy","gradeLevel":"2","category":"Writing","description":"Write informative/explanatory texts"},{"id":"2.SL.1","domain":"Literacy","gradeLevel":"2","category":"Speaking & Listening","description":"Participate in collaborative conversations"},{"id":"2.L.1","domain":"Literacy","gradeLevel":"2","category":"Language","description":"Demonstrate command of the conventions of standard English grammar"},{"id":"1A.1a","domain":"SEL","gradeLevel":"K-2","category":"Self-Awareness","description":"Identify and describe emotions"},{"id":"1A.1b","domain":"SEL","gradeLevel":"K-2","category":"Self-Awareness","description":"Recognize strengths and challenges"},{"id":"1B.1a","domain":"SEL","gradeLevel":"K-2","category":"Self-Management","description":"Describe why impulse control is important"},{"id":"1B.1b","domain":"SEL","gradeLevel":"K-2","category":"Self-Management","description":"Demonstrate the ability to delay gratification"},{"id":"2A.1a","domain":"SEL","gradeLevel":"K-2","category":"Social Awareness","description":"Recognize feelings and perspectives of others"},{"id":"2A.1b","domain":"SEL","gradeLevel":"K-2","category":"Social Awareness","description":"Recognize that others may experience situations differently"},{"id":"2B.1a","domain":"SEL","gradeLevel":"K-2","category":"Relationship Skills","description":"Describe positive qualities in others"},{"id":"2B.1b","domain":"SEL","gradeLevel":"K-2","category":"Relationship Skills","description":"Demonstrate appropriate ways to interact with others"},{"id":"2C.1a","domain":"SEL","gradeLevel":"K-2","category":"Relationship Skills","description":"Identify problems and conflicts commonly experienced"},{"id":"2C.1b","domain":"SEL","gradeLevel":"K-2","category":"Relationship Skills","description":"Identify approaches to resolving conflicts constructively"},{"id":"3A.1a","domain":"SEL","gradeLevel":"K-2","category":"Decision-Making","description":"Identify and apply the steps of systematic decision-making"},{"id":"3A.1b","domain":"SEL","gradeLevel":"K-2","category":"Decision-Making","description":"Make positive choices when interacting with classmates"}];

        // Sample resources data structure
        let resourcesData = [];
        let mappingData = [];

        // Initialize with sample data
        function initializeSampleData() {
            resourcesData = [
                {
                    resourceId: 'R001',
                    name: 'Counting Bears Activity Set',
                    format: 'Physical',
                    type: 'Game',
                    category: 'Math',
                    quantity: 1,
                    location: 'Math Cabinet',
                    description: 'Colorful counting bears for hands-on math activities',
                    source: 'Teachers Pay Teachers',
                    tptLink: 'https://www.teacherspayteachers.com/Product/...',
                    imageUrl: ''
                }
            ];
            
            mappingData = [
                {
                    resourceId: 'R001',
                    standardId: 'K.CC.A.1',
                    notes: 'Students use bears to practice counting to 100'
                },
                {
                    resourceId: 'R001',
                    standardId: 'K.CC.B.5',
                    notes: 'Bears help with "how many?" counting activities'
                }
            ];
        }

        // Load data from Google Sheets
        async function loadFromGoogleSheets() {
            const sheetsUrl = prompt('Enter your Google Sheets published URL:');
            if (!sheetsUrl) return;
            
            try {
                const response = await fetch(sheetsUrl);
                const text = await response.text();
                // Parse CSV data here
                alert('Data loaded successfully from Google Sheets!');
                renderResources();
            } catch (error) {
                alert('Error loading from Google Sheets. Please check the URL and try again.');
                console.error(error);
            }
        }

        // Filter and render resources
        function renderResources() {
            const domainFilter = document.getElementById('domainFilter').value;
            const gradeFilter = document.getElementById('gradeFilter').value;
            const typeFilter = document.getElementById('typeFilter').value;
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            
            let filteredResources = resourcesData.filter(resource => {
                // Get standards for this resource
                const resourceStandards = mappingData
                    .filter(m => m.resourceId === resource.resourceId)
                    .map(m => STANDARDS_DATA.find(s => s.id === m.standardId))
                    .filter(s => s);
                
                // Domain filter
                if (domainFilter !== 'all' && resource.category !== domainFilter) {
                    return false;
                }
                
                // Grade filter
                if (gradeFilter !== 'all') {
                    const hasMatchingGrade = resourceStandards.some(s => {
                        if (s.gradeLevel === 'K-2') return true;
                        return s.gradeLevel === gradeFilter;
                    });
                    if (!hasMatchingGrade) return false;
                }
                
                // Type filter
                if (typeFilter !== 'all' && resource.type !== typeFilter) {
                    return false;
                }
                
                // Search filter
                if (searchTerm) {
                    const matchesSearch = 
                        resource.name.toLowerCase().includes(searchTerm) ||
                        (resource.description && resource.description.toLowerCase().includes(searchTerm));
                    if (!matchesSearch) return false;
                }
                
                return true;
            });
            
            // Update stats
            updateStats(filteredResources);
            
            // Render cards
            const container = document.getElementById('resourcesContainer');
            
            if (filteredResources.length === 0) {
                container.innerHTML = `
                    <div class="no-results" style="grid-column: 1 / -1;">
                        <h3>No resources found</h3>
                        <p>Try adjusting your filters or search terms</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = filteredResources.map(resource => {
                const resourceStandards = mappingData
                    .filter(m => m.resourceId === resource.resourceId)
                    .map(m => STANDARDS_DATA.find(s => s.id === m.standardId))
                    .filter(s => s);
                
                const categoryClass = resource.category.toLowerCase();
                
                return `
                    <div class="resource-card ${categoryClass}">
                        <div class="resource-header">
                            <div class="resource-id">${resource.resourceId}</div>
                            <div class="resource-category category-${categoryClass}">
                                ${resource.category}
                            </div>
                        </div>
                        
                        <div class="resource-name">${resource.name}</div>
                        
                        <div class="resource-meta">
                            <span class="meta-tag">📋 ${resource.type}</span>
                            <span class="meta-tag">📦 ${resource.format}</span>
                            ${resource.quantity ? `<span class="meta-tag">🔢 Qty: ${resource.quantity}</span>` : ''}
                        </div>
                        
                        ${resource.description ? `<div class="resource-description">${resource.description}</div>` : ''}
                        
                        ${resource.location ? `<div class="meta-tag">📍 ${resource.location}</div>` : ''}
                        
                        ${resourceStandards.length > 0 ? `
                            <div class="standards-list">
                                <h4>Aligned Standards (${resourceStandards.length})</h4>
                                ${resourceStandards.map(s => 
                                    `<span class="standard-tag" title="${s.description}">${s.id}</span>`
                                ).join('')}
                            </div>
                        ` : ''}
                        
                        ${resource.tptLink ? `
                            <a href="${resource.tptLink}" target="_blank" class="resource-link">
                                🔗 View on TPT
                            </a>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        // Update statistics
        function updateStats(resources) {
            const mathCount = resources.filter(r => r.category === 'Math').length;
            const literacyCount = resources.filter(r => r.category === 'Literacy').length;
            const selCount = resources.filter(r => r.category === 'SEL').length;
            
            document.getElementById('mathCount').textContent = mathCount;
            document.getElementById('literacyCount').textContent = literacyCount;
            document.getElementById('selCount').textContent = selCount;
        }

        // Reset all filters
        function resetFilters() {
            document.getElementById('domainFilter').value = 'all';
            document.getElementById('gradeFilter').value = 'all';
            document.getElementById('typeFilter').value = 'all';
            document.getElementById('searchBox').value = '';
            renderResources();
        }

        // Event listeners
        document.getElementById('domainFilter').addEventListener('change', renderResources);
        document.getElementById('gradeFilter').addEventListener('change', renderResources);
        document.getElementById('typeFilter').addEventListener('change', renderResources);
        document.getElementById('searchBox').addEventListener('input', renderResources);

        // Initialize on load
        initializeSampleData();
        renderResources();
    </script>
</body>
</html>
