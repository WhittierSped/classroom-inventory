<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Goal Mapper</title>

<link rel="preconnect" hrefm
<link rel="preconnect" href="https://fonts.gstatic.com"gleapis.com/css2?family=Fredoka:wght@500;700&family=DM+Sans:wght@400;600&display=swap" rel="://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.fullpt>

<style>
body {
    font-family: 'DM Sans', sans-serif;
    background: #FFF8F0;
    margin: 0;
}
.header {
    padding: 1rem;
    background: white;
    border-bottom: 3px solid #FFD93D;
}
.btn {
    padding: .6rem 1rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: 600;
}
.btn-primary { background:#9D84FF;color:white }
.btn-secondary { background:white;border:2px solid #ddd }
.main { display:grid; grid-template-columns:300px 1fr; gap:1rem; padding:1rem }
.student-item { border:2px solid #eee;padding:.6rem;border-radius:8px;cursor:pointer }
.student-item.active { border-color:#9D84FF;background:#f4f0ff }
.modal { display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center }
.modal.active { display:flex }
.modal-content { background:white;padding:1rem;border-radius:12px;width:90%;max-width:700px }
.modal-goal-item { display:flex;gap:.5rem;padding:.5rem;border-radius:6px }
</style>
</head>

<body>

<div class="header">
    <button class="btn btn-secondary" onclick="loadFromGoogleSheets()">📊 Load from Google Sheets</button>
    <button class="btn btn-primary" onclick="openAddStudentModal()">➕ Add Student</button>
</div>

<div class="main">
    <div id="studentList"></div>
    <div id="content">Select a student</div>
</div>

<div class="modal" id="studentModal">
    <div class="modal-content">
        <h2>Add / Edit Student</h2>

        <form onsubmit="saveStudent(event)">
            <input id="studentIdInput" required placeholder="Student ID"><br><br>
            <input id="studentNameInput" required placeholder="Name"><br><br>

            <h3>Assign Goals</h3>
            <div id="modalGoalsList"></div>

            <br>
            <button class="btn btn-primary" type="submit">Save</button>
            <button type="button" class="btn btn-secondary" onclick="closeStudentModal()">Cancel</button>
        </form>
    </div>
</div>

<script>
/* ---------------- DATA ---------------- */
let students = [];
let goals = [];
let studentGoalAssignments = [];
let editingStudentId = null;

/* ---------------- INIT ---------------- */
document.addEventListener('DOMContentLoaded', () => {
    loadDataFromLocalStorage();
    renderStudents();
});

/* ---------------- STORAGE ---------------- */
function saveDataToLocalStorage() {
    localStorage.setItem('students', JSON.stringify(students));
    localStorage.setItem('goals', JSON.stringify(goals));
    localStorage.setItem('assignments', JSON.stringify(studentGoalAssignments));
}

function loadDataFromLocalStorage() {
    students = JSON.parse(localStorage.getItem('students')) || [];
    goals = JSON.parse(localStorage.getItem('goals')) || [];
    studentGoalAssignments = JSON.parse(localStorage.getItem('assignments')) || [];
}

/* ---------------- RENDER ---------------- */
function renderStudents() {
    document.getElementById('studentList').innerHTML = students.map(s =>
        `<div class="student-item" onclick="editStudent('${s.studentId}')">
            ${s.studentId} — ${s.name}
        </div>`
    ).join('');
}

/* ---------------- MODAL ---------------- */
function openAddStudentModal() {
    editingStudentId = null;
    document.getElementById('studentIdInput').value = '';
    document.getElementById('studentNameInput').value = '';
    renderModalGoals();
    document.getElementById('studentModal').classList.add('active');
}

function editStudent(id) {
    editingStudentId = id;
    const s = students.find(x => x.studentId === id);
    document.getElementById('studentIdInput').value = s.studentId;
    document.getElementById('studentNameInput').value = s.name;
    renderModalGoals();
    document.getElementById('studentModal').classList.add('active');
}

function closeStudentModal() {
    document.getElementById('studentModal').classList.remove('active');
}

/* ✅ SAFETY‑HARDENED GOALS RENDER */
function renderModalGoals() {
    const container = document.getElementById('modalGoalsList');

    if (!goals || goals.length === 0) {
        container.innerHTML = '<p>No goals loaded.</p>';
        return;
    }

    container.innerHTML = goals.map(g =>
        `<div class="modal-goal-item">
            <input type="checkbox"
                class="modal-goal-checkbox"
                value="${g.goalId}"
                ${editingStudentId && studentGoalAssignments.some(a => a.studentId===editingStudentId && a.goalId===g.goalId) ? 'checked' : ''}>
            ${g.goalId} — ${g.description}
         </div>`
    ).join('');
}

/* ---------------- SAVE ---------------- */
function saveStudent(e) {
    e.preventDefault();

    const id = studentIdInput.value;
    const name = studentNameInput.value;

    if (!editingStudentId) {
        students.push({ studentId:id, name });
    } else {
        const i = students.findIndex(s => s.studentId === editingStudentId);
        students[i] = { studentId:id, name };
        studentGoalAssignments = studentGoalAssignments.filter(a => a.studentId !== id);
    }

    document.querySelectorAll('.modal-goal-checkbox:checked').forEach(cb => {
        studentGoalAssignments.push({ studentId:id, goalId:cb.value });
    });

    saveDataToLocalStorage();
    renderStudents();
    closeStudentModal();
}

/* ---------------- GOOGLE SHEETS ---------------- */
async function loadFromGoogleSheets() {
    const sheetId = '1aGE87Qp9zHS2VVW-GnLPHPXyKjzAa8uk';

    const getCSV = name =>
        fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`).then(r=>r.text());

    students = parseStudentsCSV(await getCSV('Students'));
    studentGoalAssignments = parseAssignmentsCSV(await getCSV('Student-Goal Assignments'));
    goals = parseGoalsCSV(await getCSV('IEP Goals'));

    saveDataToLocalStorage();
    renderStudents();
    renderModalGoals();

    alert(`Loaded ✅\nStudents: ${students.length}\nGoals: ${goals.length}`);
}

/* ---------------- CSV PARSE ---------------- */
const parseCSVLine = line => {
    const r=[];let c='',q=false;
    for (let ch of line) {
        if (ch === '"') q=!q;
        else if (ch===','&&!q){r.push(c);c=''}
        else c+=ch
    }
    r.push(c);
    return r.map(v=>v.replace(/^"|"$/g,'').trim());
};

const parseStudentsCSV = csv =>
    csv.split('\n').slice(1).map(l=>parseCSVLine(l)).filter(v=>v.length>=2)
        .map(v=>({studentId:v[0],name:v[1]}));

const parseAssignmentsCSV = csv =>
    csv.split('\n').slice(1).map(l=>parseCSVLine(l)).filter(v=>v.length>=2)
        .map(v=>({studentId:v[0],goalId:v[1]}));

const parseGoalsCSV = csv =>
    csv.split('\n').slice(1).map(l=>parseCSVLine(l)).filter(v=>v.length>=4)
        .map(v=>({goalId:v[0],domain:v[1],subcategories:v[2],description:v[3]}));
</script>
</body>
</html>
