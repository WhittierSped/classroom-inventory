<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>2-Digit Addition & Subtraction Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f3ee; --surface: #fff; --border: #d8d4cc; --border-light: #e8e4dc;
    --text: #1a1917; --text-secondary: #6b6760; --text-hint: #a09c97;
    --accent: #c90076; --accent-light: #ffe7f5; --radius: 6px;
  }
  body { font-family:'Lexend',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:2rem 1rem 4rem; }
  .page { max-width:820px; margin:0 auto; }
  header { margin-bottom:2rem; }
  .logo { display:inline-flex; align-items:center; gap:10px; margin-bottom:.4rem; }
  .logo-mark { width:36px; height:36px; background:var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; }
  h1 { font-size:22px; font-weight:600; letter-spacing:-.3px; }
  .subtitle { font-size:14px; color:var(--text-secondary); font-weight:300; margin-top:2px; }

  .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.5rem; margin-bottom:1.25rem; }
  .card-title { font-size:12px; font-weight:500; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.06em; margin-bottom:1rem; }
  .row { display:flex; flex-wrap:wrap; gap:1rem; align-items:flex-start; }
  .field { display:flex; flex-direction:column; gap:6px; }
  .field label { font-size:12px; font-weight:500; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.05em; }

  .chips { display:flex; flex-wrap:wrap; gap:6px; }
  .chip { display:inline-flex; align-items:center; padding:5px 14px; border-radius:20px; border:1px solid var(--border); background:var(--surface); font-family:'Lexend',sans-serif; font-size:13px; cursor:pointer; user-select:none; color:var(--text-secondary); transition:all .15s; }
  .chip.on { background:var(--accent); border-color:var(--accent); color:#fff; }
  .chip:hover:not(.on) { border-color:#aaa; color:var(--text); }

  select { font-family:'Lexend',sans-serif; font-size:13px; padding:6px 10px; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface); color:var(--text); outline:none; cursor:pointer; }
  select:focus { border-color:var(--accent); }

  .controls-row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-top:1.25rem; }
  button { font-family:'Lexend',sans-serif; font-size:13px; font-weight:500; padding:8px 18px; border-radius:var(--radius); cursor:pointer; outline:none; border:none; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:#255234; }
  .btn-secondary { background:var(--surface); color:var(--text); border:1px solid var(--border); }
  .btn-secondary:hover { background:var(--bg); }
  .btn-secondary:disabled { opacity:.4; cursor:not-allowed; }

  .output-card { display:none; background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:1.25rem; margin-top:1.25rem; }
  .output-header { display:flex; align-items:center; justify-content:space-between; padding:1rem 1.5rem; border-bottom:1px solid var(--border-light); }
  .output-title { font-size:12px; font-weight:500; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.06em; }
  .output-footer { padding:.75rem 1.5rem; border-top:1px solid var(--border-light); display:flex; gap:10px; }

  /* ── Sheet ── */
  .sheet { padding:1.5rem 2rem; font-family:'Lexend',sans-serif; }

  .sheet-header { display:flex; justify-content:flex-end; gap:1.5rem; margin-bottom:1.4rem; font-size:13px; color:var(--text-secondary); align-items:baseline; }
  .sheet-header-field { display:flex; align-items:baseline; gap:6px; white-space:nowrap; }
  .sheet-header-line { display:inline-block; border-bottom:1px solid var(--border); }
  .shl-name { width:2in; }
  .shl-date { width:1in; }

  .sheet-label {
    font-size:13px;
    font-weight:500;
    color:var(--text-secondary);
    margin-bottom:1rem;
    letter-spacing:.01em;
  }

  /* Problem grid */
  .problem-grid { display:grid; }

  /* Each problem unit = stacked equation + T-chart side by side */
  .prob-unit {
    display:flex;
    align-items:flex-start;
    gap:28px;
  }

  /* Vertical stacked equation */
  .v-equation {
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    font-family:'Lexend',sans-serif;
    font-size:28px;
    font-weight:400;
    color:var(--text);
    line-height:1.3;
  }

  .v-top { /* top number */ }
  .v-bottom-row {
    display:flex;
    align-items:center;
    gap:4px;
  }
  .v-op {
    font-weight:300;
    color:var(--text-secondary);
    font-size:24px;
    margin-right:2px;
  }
  .v-line {
    border-top:1.5px solid var(--text);
    width:100%;
    margin:3px 0;
  }
  .v-ans {
    /* blank answer line — just height */
    height:1.2em;
    width:100%;
  }
  /* Regrouping box above tens column */
  .regroup-row {
    display:flex;
    justify-content:flex-end;
    font-size:12px;
    color:var(--text-hint);
    height:1em;
    margin-bottom:1px;
  }
  .regroup-box {
    width:1em;
    height:1em;
    border:1px dashed #bbb;
    border-radius:2px;
    margin-right:1px;
  }

  /* T-chart — big open box, thick outer border, bold header, solid center line */
  .t-chart {
    display:inline-block;
    border:2.5px solid #222;
    font-family:'Lexend',sans-serif;
    flex-shrink:0;
    align-self:flex-start;
    /* No overflow:hidden so inner borders aren't clipped */
  }
  /* Header row */
  .tc-header-row {
    display:flex;
    border-bottom:2.5px solid #222;
  }
  .tc-head {
    flex:1;
    padding:5px 0;
    text-align:center;
    font-weight:600;
    font-size:14px;
    color:var(--text);
    background:#fff;
  }
  .tc-head:first-child {
    border-right:2.5px solid #222;
  }
  /* Body row */
  .tc-body-row {
    display:flex;
  }
  .tc-col {
    flex:1;
    width:90px;
    height:90px;
  }
  .tc-col:first-child {
    border-right:2.5px solid #222;
  }

  /* ── Print ── */
  @media print {
    @page { margin:.45in .65in; size:letter; }
    * { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    body { background:#fff; padding:0; margin:0; }
    body > * { display:none !important; }
    .page { display:block !important; max-width:100%; margin:0; padding:0; }
    .page > * { display:none !important; }
    .output-card { display:block !important; border:none !important; box-shadow:none !important; margin:0 !important; }
    .output-header, .output-footer { display:none !important; }
    .sheet {
      display:flex !important;
      flex-direction:column;
      padding:0; margin:0;
      min-height:9.6in;
    }
    .sheet-header { font-size:11pt; margin-bottom:.1in; flex-shrink:0; }
    .sheet-label { font-size:11pt; font-weight:500; margin-bottom:.15in; color:#444; }
    .sheet-header-line { border-bottom:1pt solid #000; }
    .shl-name { width:2in; }
    .shl-date { width:1in; }
    .problem-grid { flex:1; }
    .problem-grid.spacing-fill { align-content:space-between; }
    .problem-grid.spacing-spread { align-content:space-around; }
    .v-equation { font-size:24pt; }
    .v-op { font-size:22pt; }
    .v-line { border-top:1.5pt solid #000; }
    .t-chart { border:2pt solid #000; }
    .tc-header-row { border-bottom:2pt solid #000; }
    .tc-head { font-size:12pt; padding:3pt 0; font-weight:600; }
    .tc-head:first-child { border-right:2pt solid #000; }
    .tc-col { width:80pt; height:80pt; }
    .tc-col:first-child { border-right:2pt solid #000; }
    .regroup-box { border:1pt dashed #aaa; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="logo">
      <div class="logo-mark">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="3" y="5" width="14" height="2.5" rx="1.25" fill="white" opacity=".9"/>
          <rect x="3" y="9" width="14" height="2.5" rx="1.25" fill="white" opacity=".6"/>
          <rect x="3" y="13" width="9" height="2.5" rx="1.25" fill="white" opacity=".35"/>
        </svg>
      </div>
      <h1>2-Digit Addition &amp; Subtraction</h1>
    </div>
    <p class="subtitle">Vertical format · Tens &amp; Ones T-chart · CBM</p>
  </header>

  <!-- Operation & Regrouping -->
  <div class="card">
    <div class="card-title">Operation &amp; Type</div>
    <div class="row" style="gap:2rem;">
      <div class="field">
        <label>Operation</label>
        <div class="chips" id="op-chips">
          <span class="chip on" onclick="pickOp('+',this)">+ Addition</span>
          <span class="chip" onclick="pickOp('-',this)">− Subtraction</span>
        </div>
      </div>
      <div class="field">
        <label>Regrouping</label>
        <div class="chips" id="regroup-chips">
          <span class="chip on" onclick="pickRegroup('none',this)">Without regrouping</span>
          <span class="chip" onclick="pickRegroup('with',this)">With regrouping</span>
          <span class="chip" onclick="pickRegroup('mixed',this)">Mixed</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Layout -->
  <div class="card">
    <div class="card-title">Layout</div>
    <div class="row" style="gap:2rem;">
      <div class="field">
        <label>Problems per sheet</label>
        <select id="prob-count">
          <option value="4">4</option>
          <option value="6">6</option>
          <option value="8" selected>8</option>
          <option value="10">10</option>
          <option value="12">12</option>
        </select>
      </div>
      <div class="field">
        <label>Columns</label>
        <select id="layout">
          <option value="2" selected>2 columns</option>
        </select>
      </div>
      <div class="field">
        <label>Spacing</label>
        <select id="spacing">
          <option value="normal" selected>Normal</option>
          <option value="spread">Spread out</option>
          <option value="full">Fill page</option>
        </select>
      </div>

    </div>
  </div>

  <div class="controls-row">
    <button class="btn-primary" onclick="generate()">Generate Sheet</button>
    <button class="btn-secondary" id="print-btn" disabled onclick="window.print()">Print / Save as PDF</button>
    <button class="btn-secondary" id="reshuffle-btn" style="display:none" onclick="generate()">Regenerate</button>
  </div>

  <div class="output-card" id="output-card">
    <div class="output-header">
      <span class="output-title">2-Digit Sheet</span>
      <span id="sheet-stats" style="font-size:12px;color:var(--text-hint);"></span>
    </div>
    <div class="sheet" id="sheet"></div>
    <div class="output-footer">
      <button class="btn-secondary" onclick="window.print()" style="font-size:12px;padding:6px 14px;">Print / Save as PDF</button>
      <button class="btn-secondary" onclick="generate()" style="font-size:12px;padding:6px 14px;">Regenerate</button>
    </div>
  </div>

</div>
<script>
  var op = '+';
  var regroup = 'none'; // 'none' or 'with'

  function pickOp(o, el){
    document.querySelectorAll('#op-chips .chip').forEach(function(c){c.classList.remove('on');});
    el.classList.add('on');
    op = o;
  }

  function pickRegroup(r, el){
    document.querySelectorAll('#regroup-chips .chip').forEach(function(c){c.classList.remove('on');});
    el.classList.add('on');
    regroup = r;
  }

  function randInt(min, max){ return Math.floor(Math.random()*(max-min+1))+min; }

  function shuffle(arr){
    var a=arr.slice();
    for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
    return a;
  }

  /* Generate a 2-digit + problem.
     Without regrouping: ones digits sum <= 9, result <= 99
     With regrouping:    ones digits sum >= 10, result <= 99  */
  function makeAddition(){
    var a, b, tries=0;
    do {
      a = randInt(10, 89);
      b = randInt(10, 99-a);
      var onesA = a % 10;
      var onesB = b % 10;
      var carries = (onesA + onesB) >= 10;
      tries++;
      if(tries > 200) break;
    } while(regroup==='none' ? carries : !carries);
    return {a:a, b:b, op:'+'};
  }

  /* Generate a 2-digit - problem.
     Without regrouping: ones of top >= ones of bottom
     With regrouping:    ones of top < ones of bottom  */
  function makeSubtraction(){
    var a, b, tries=0;
    do {
      a = randInt(20, 99);
      b = randInt(10, a-1);
      var onesA = a % 10;
      var onesB = b % 10;
      var needsRegroup = onesA < onesB;
      tries++;
      if(tries > 200) break;
    } while(regroup==='none' ? needsRegroup : !needsRegroup);
    return {a:a, b:b, op:'-'};
  }

  function makeProblem(){
    if(regroup==='mixed'){
      // temporarily flip regroup for this one problem
      var saved=regroup;
      regroup=Math.random()<0.5 ? 'with' : 'none';
      var p=op==='+' ? makeAddition() : makeSubtraction();
      regroup=saved;
      return p;
    }
    return op==='+' ? makeAddition() : makeSubtraction();
  }

  function renderTChart(){
    return '<div class="t-chart">'+
      '<div class="tc-header-row"><div class="tc-head">Tens</div><div class="tc-head">Ones</div></div>'+
      '<div class="tc-body-row"><div class="tc-col"></div><div class="tc-col"></div></div>'+
      '</div>';
  }

  function renderProblem(p, showRegroup){
    var html='<div class="prob-unit">';

    // Vertical equation
    html+='<div class="v-equation">';

    // Regrouping workspace row (dashed box above tens column, for "with regrouping" sheets)
    if(showRegroup){
      html+='<div class="regroup-row"><div class="regroup-box"></div></div>';
    } else {
      html+='<div class="regroup-row"></div>';
    }

    html+='<div class="v-top">'+p.a+'</div>';
    html+='<div class="v-bottom-row"><span class="v-op">'+p.op+'</span><span>'+p.b+'</span></div>';
    html+='<div class="v-line"></div>';
    html+='<div class="v-ans">&nbsp;</div>';
    html+='</div>';

    // T-chart
    html+=renderTChart();

    html+='</div>';
    return html;
  }

  var spacingMap = {
    normal: { rowGap:'1.2rem', colGap:'1.5rem' },
    spread: { rowGap:'2rem',   colGap:'1.5rem' },
    full:   { rowGap:'1rem',   colGap:'1.5rem' }
  };

  function generate(){
    var count   = parseInt(document.getElementById('prob-count').value)||8;
    var cols    = parseInt(document.getElementById('layout').value)||2;
    var spacing = document.getElementById('spacing').value;
    var showRegroup = regroup==='with' || regroup==='mixed';

    var problems=[];
    for(var i=0;i<count;i++) problems.push(makeProblem());
    problems=shuffle(problems);

    var sp=spacingMap[spacing]||spacingMap.normal;
    var gridClass='problem-grid';
    if(spacing==='full') gridClass+=' spacing-fill';
    else if(spacing==='spread') gridClass+=' spacing-spread';
    var gridStyle='grid-template-columns:repeat('+cols+',1fr);row-gap:'+sp.rowGap+';column-gap:'+sp.colGap+';';

    var html='';

    // Sheet header
    var opLabel   = op==='+' ? 'Addition' : 'Subtraction';
    var typeLabel = regroup==='with' ? 'With Regrouping' : regroup==='mixed' ? 'Mixed' : 'Without Regrouping';
    html+='<div class="sheet-header">';
    html+='<div class="sheet-header-field"><span>Name:</span><span class="sheet-header-line shl-name"></span></div>';
    html+='<div class="sheet-header-field"><span>Date:</span><span class="sheet-header-line shl-date"></span></div>';
    html+='</div>';
    html+='<div class="sheet-label">'+opLabel+' &mdash; '+typeLabel+'</div>';

    html+='<div class="'+gridClass+'" style="'+gridStyle+'">';
    problems.forEach(function(p){
      html+=renderProblem(p, showRegroup);
    });
    html+='</div>';

    document.getElementById('sheet').innerHTML=html;

    document.getElementById('sheet-stats').textContent = count+' problems · '+opLabel+' · '+typeLabel;

    document.getElementById('output-card').style.display='block';
    document.getElementById('print-btn').disabled=false;
    document.getElementById('reshuffle-btn').style.display='inline-block';
    document.getElementById('output-card').scrollIntoView({behavior:'smooth',block:'start'});
  }
</script>
</body>
</html>
